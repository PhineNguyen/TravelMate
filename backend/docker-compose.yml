services:
  postgres:
    image: postgres:16
    container_name: travelmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travelmate
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 21052026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d travelmate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelmate-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin123
      SPRING_APPLICATION_NAME: travelmate-backend
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelmate
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 21052026
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: email_cua_ban@gmail.com
      SPRING_MAIL_PASSWORD: app_password_lay_tu_gmail  
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    ports:
      - "8080:8080"
    # Cấu hình dùng để tự động build lại backend khi bạn sửa code ở máy local (Development)
    develop:
      watch:
        - action: rebuild
          path: .

  # Thêm dịch vụ Watchtower để tự động cập nhật các image từ Docker Hub/Registry
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: travelmate-watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_INTERVAL=300 # Kiểm tra image mới mỗi 300 giây (5 phút)
  #   # Nếu chỉ muốn watchtower cập nhật postgres, bỏ comment dòng dưới:
  #   # command: travelmate-postgres

volumes:
  postgres_data: {}